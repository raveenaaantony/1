<html>
  <head>
    <title>personal finance tracker</title>
  <body>
    <h1 style="color:blue;text-align:center;">spendwise</h1>
    <style>
    body{
    font-family: Arial, sans-serif;
    background: #f4f7fc;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1{
    color: #4f46e5;
    font-size: 40px;
}

h2{
    color: #dc2626;
}

.summary{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
}

.card{
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    width: 120px;
}

.form-box{
    background: white;
    width: 350px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
}

input,select{
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button{
    background: #4f46e5;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background: #3730a3;
}

#transaction-list{
    width: 400px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
}
  </head>
</style>
    <h1>SpendWise</h1>

<div class="summary">
    <div class="card">Balance<br>₹0</div>
    <div class="card">Income<br>₹0</div>
    <div class="card">Expenses<br>₹0</div>
</div>

<div class="form-box">
    <h2>Transaction Form</h2>

    <input type="text" placeholder="Description">

    <input type="number" placeholder="Amount">

    <select id="sel">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>

    <br><br>

    <button id="btn" onclick="disp()">Add Transaction</button>
</div>

<div id="transaction-list">
    <h2 id="trans">Transaction List</h2>
</div>
    <script>
      function disp(){
      let r=document.getElementById("sel").value;
     document.getElementById("trans").innerHTML=r;
      }
        
    </script>
  </body>
</html>
